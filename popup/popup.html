<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>Bitbucket Diff Themes</h1>

  <label class="row">
    <span>Enabled</span>
    <input type="checkbox" id="enabled" />
  </label>

  <label class="row">
    <span>Theme</span>
    <select id="theme"></select>
  </label>

  <label class="row">
    <span>Font size</span>
    <input type="range" id="fontSize" min="11" max="16" step="0.5" />
    <output id="fontSizeOut"></output>
  </label>

  <label class="row">
    <span>Line height</span>
    <input type="range" id="lineHeight" min="1.3" max="1.9" step="0.05" />
    <output id="lineHeightOut"></output>
  </label>

  <label class="row">
    <span>Mono font</span>
    <select id="fontFamily">
      <option value="'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace">JetBrains Mono</option>
      <option value="'Fira Code', Menlo, Consolas, monospace">Fira Code</option>
      <option value="'SF Mono', Menlo, monospace">SF Mono</option>
      <option value="Menlo, monospace">Menlo</option>
      <option value="Consolas, monospace">Consolas</option>
      <option value="monospace">System default</option>
    </select>
  </label>

  <script src="../src/themes.js"></script>
  <script src="popup.js"></script>
</body>
</html>
